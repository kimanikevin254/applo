<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applo</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy: #0f172a;
            --navy-light: #1e293b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --muted: #64748b;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

        /* Header */
        header {
            background: var(--navy); height: 56px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.06);
            position: sticky; top: 0; z-index: 40;
        }
        .logo { display: flex; align-items: center; gap: 0.5rem; color: white; text-decoration: none; font-weight: 600; font-size: 1rem; letter-spacing: -0.01em; }
        .logo svg { color: #6366f1; }
        .header-right { display: flex; align-items: center; gap: 0.75rem; }

        /* Resume dropdown */
        .resume-menu { position: relative; }
        .resume-btn {
            display: flex; align-items: center; gap: 0.4rem;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; padding: 0.4rem 0.7rem; cursor: pointer;
            color: rgba(255,255,255,0.8); font-size: 0.8rem; transition: background 0.15s;
        }
        .resume-btn:hover { background: rgba(255,255,255,0.1); }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; }
        .status-dot.loaded { background: var(--success); }
        .status-dot.missing { background: var(--danger); }

        .resume-dropdown {
            display: none; position: absolute; top: calc(100% + 6px); right: 0;
            background: white; border: 1px solid var(--border); border-radius: 8px;
            min-width: 176px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); z-index: 50; overflow: hidden;
        }
        .resume-dropdown.open { display: block; }
        .dropdown-item {
            display: flex; align-items: center; gap: 0.6rem;
            padding: 0.6rem 0.9rem; font-size: 0.82rem; color: var(--text);
            cursor: pointer; text-decoration: none; width: 100%;
            background: none; border: none; text-align: left; transition: background 0.1s;
        }
        .dropdown-item:hover { background: var(--bg); }
        .dropdown-item.disabled { color: #cbd5e1; pointer-events: none; }
        .dropdown-item svg { color: var(--muted); flex-shrink: 0; }
        .dropdown-divider { height: 1px; background: var(--border); }

        /* Run scraper button */
        .scraper-btn {
            display: flex; align-items: center; gap: 0.4rem;
            background: var(--accent); color: white; border: none;
            border-radius: 6px; padding: 0.4rem 0.9rem;
            font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: background 0.15s;
        }
        .scraper-btn:hover { background: var(--accent-hover); }

        /* Layout */
        .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

        /* Filters */
        .filter-bar { display: flex; gap: 0.3rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
        .filter-pill {
            padding: 0.35rem 0.85rem; border-radius: 20px; text-decoration: none;
            font-size: 0.8rem; font-weight: 500; color: var(--muted);
            background: var(--surface); border: 1px solid var(--border); transition: all 0.15s;
        }
        .filter-pill:hover { border-color: #94a3b8; color: var(--text); }
        .filter-pill.active { background: var(--navy); color: white; border-color: var(--navy); }

        /* Stats strip */
        .stats-strip {
            display: flex; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap;
        }
        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 0.6rem 1rem;
            display: flex; align-items: center; gap: 0.6rem;
        }
        .stat-card .stat-num { font-size: 1.1rem; font-weight: 700; color: var(--text); }
        .stat-card .stat-label { font-size: 0.75rem; color: var(--muted); }

        /* Table */
        .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            padding: 0.65rem 1rem; text-align: left; font-size: 0.72rem;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--muted); background: #f8fafc; border-bottom: 1px solid var(--border);
        }
        tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #f8fafc; }
        td { padding: 0.75rem 1rem; vertical-align: middle; }

        /* Badges */
        .badge {
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 0.2rem 0.55rem; border-radius: 5px;
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
        }
        .badge-indeed    { background: #eff6ff; color: #3b82f6; }
        .badge-glassdoor { background: #f0fdf4; color: #16a34a; }
        .badge-pending       { background: #fef9ec; color: #b45309; }
        .badge-optimizing    { background: #eff6ff; color: #2563eb; }
        .badge-optimized     { background: #f0fdf4; color: #15803d; }
        .badge-approved      { background: #eef2ff; color: #4338ca; }
        .badge-applied       { background: #f1f5f9; color: #475569; }
        .badge-not_interested{ background: #fef2f2; color: #b91c1c; }
        .badge-rejected      { background: #fef2f2; color: #b91c1c; }

        /* Job cell */
        .job-title { font-weight: 600; font-size: 0.875rem; color: var(--text); }
        .job-title a { color: inherit; text-decoration: none; }
        .job-title a:hover { color: var(--accent); }
        .job-meta { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.2rem; flex-wrap: wrap; }
        .job-company { font-size: 0.8rem; color: var(--muted); font-weight: 500; }
        .job-location { font-size: 0.78rem; color: #94a3b8; }
        .meta-dot { width: 3px; height: 3px; border-radius: 50%; background: #cbd5e1; }

        .salary { font-size: 0.82rem; font-weight: 600; color: #059669; }
        .no-salary { color: #cbd5e1; }

        /* Icon action buttons */
        .actions { display: flex; align-items: center; gap: 0.3rem; }
        .icon-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--surface); cursor: pointer; transition: all 0.15s;
            color: var(--muted); position: relative;
        }
        .icon-btn:hover { background: var(--bg); border-color: #94a3b8; color: var(--text); }
        .icon-btn.icon-btn-accent:hover  { background: #eef2ff; border-color: var(--accent); color: var(--accent); }
        .icon-btn.icon-btn-success:hover { background: #f0fdf4; border-color: var(--success); color: var(--success); }
        .icon-btn.icon-btn-danger:hover  { background: #fef2f2; border-color: var(--danger);  color: var(--danger); }
        .icon-btn.icon-btn-warning:hover { background: #fffbeb; border-color: var(--warning); color: var(--warning); }

        /* Tooltip */
        .icon-btn[data-tip]::after {
            content: attr(data-tip);
            position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
            background: var(--navy); color: white; font-size: 0.7rem; white-space: nowrap;
            padding: 0.25rem 0.5rem; border-radius: 4px; pointer-events: none;
            opacity: 0; transition: opacity 0.15s;
        }
        .icon-btn[data-tip]:hover::after { opacity: 1; }

        .optimizing-label { font-size: 0.78rem; color: #2563eb; display: flex; align-items: center; gap: 0.35rem; }

        /* Full-width action buttons (detail page) */
        .action-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
            padding: 0.55rem; width: 100%; border: 1px solid var(--border);
            border-radius: 7px; font-size: 0.82rem; font-weight: 500;
            cursor: pointer; background: var(--bg); color: var(--text); transition: all 0.15s;
        }
        .action-btn:hover { background: #f1f5f9; }
        .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .action-btn-accent  { background: var(--accent); color: white; border-color: var(--accent); }
        .action-btn-accent:hover  { background: var(--accent-hover); border-color: var(--accent-hover); }
        .action-btn-success { background: var(--success); color: white; border-color: var(--success); }
        .action-btn-success:hover { background: #059669; border-color: #059669; }
        .action-btn-danger  { background: white; color: var(--danger); border-color: #fca5a5; }
        .action-btn-danger:hover  { background: #fef2f2; }
        .action-btn-warning { background: white; color: #92400e; border-color: #fcd34d; }
        .action-btn-warning:hover { background: #fffbeb; }

        #actions-card.htmx-request { opacity: 0.5; pointer-events: none; }


        @keyframes spin { to { transform: rotate(360deg); } }
        .spinning { animation: spin 1s linear infinite; display: inline-block; }

        tr.htmx-request td { opacity: 0.5; pointer-events: none; }

        .empty { text-align: center; padding: 4rem; color: var(--muted); }
        .empty svg { margin-bottom: 0.75rem; color: #cbd5e1; }
        .empty p { font-size: 0.9rem; }

        /* Upload modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); z-index: 100;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white; border-radius: 12px; padding: 1.75rem;
            width: 420px; max-width: 92vw; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; }
        .modal h2 { font-size: 1rem; font-weight: 700; color: var(--text); }
        .modal p { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.5; }
        .modal-close { background: none; border: none; cursor: pointer; color: #94a3b8; padding: 0.2rem; border-radius: 4px; }
        .modal-close:hover { color: var(--text); background: var(--bg); }

        .upload-area {
            border: 2px dashed var(--border); border-radius: 8px; padding: 1.5rem;
            text-align: center; cursor: pointer; transition: all 0.15s; position: relative;
        }
        .upload-area:hover, .upload-area.dragover { border-color: var(--accent); background: #eef2ff22; }
        .upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
        .upload-area svg { color: #cbd5e1; margin-bottom: 0.5rem; }
        .upload-area-text strong { display: block; font-size: 0.85rem; color: var(--text); margin-bottom: 0.2rem; }
        .upload-area-text span { font-size: 0.78rem; color: var(--muted); }

        #selected-filename { font-size: 0.78rem; color: var(--accent); margin-top: 0.6rem; font-weight: 500; min-height: 1em; }
        #upload-status { display: block; margin-top: 0.6rem; font-size: 0.82rem; min-height: 1.2em; }

        .upload-submit {
            margin-top: 1rem; width: 100%; padding: 0.6rem;
            background: var(--accent); color: white; border: none;
            border-radius: 7px; cursor: pointer; font-size: 0.85rem; font-weight: 500;
            transition: background 0.15s;
        }
        .upload-submit:hover { background: var(--accent-hover); }
        .upload-submit:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- Upload modal -->
    <div class="modal-overlay" id="upload-modal" onclick="closeUploadModal(event)">
        <div class="modal">
            <div class="modal-header">
                <h2>Upload Resume</h2>
                <button class="modal-close" onclick="document.getElementById('upload-modal').classList.remove('open')">
                    <i data-lucide="x" style="width:16px;height:16px;"></i>
                </button>
            </div>
            <p>Upload your base <strong>.docx</strong> file. It will replace the current master resume used for all optimizations.</p>

            <form id="upload-form"
                hx-post="/resume/upload"
                hx-target="#upload-status"
                hx-swap="outerHTML"
                hx-encoding="multipart/form-data"
                hx-on::after-request="onUploadDone(event)">

                <div class="upload-area" id="upload-area">
                    <input type="file" name="file" accept=".docx" id="resume-file-input" onchange="onFileSelected(this)">
                    <i data-lucide="file-text" style="width:28px;height:28px;"></i>
                    <div class="upload-area-text">
                        <strong>Click to choose a file</strong>
                        <span>or drag and drop · .docx only</span>
                    </div>
                </div>
                <div id="selected-filename"></div>
                <span id="upload-status"></span>
                <button type="submit" class="upload-submit" id="upload-submit-btn" disabled>Upload Resume</button>
            </form>
        </div>
    </div>

    <header>
        <a href="/" class="logo">
            <i data-lucide="zap" style="width:18px;height:18px;"></i>
            Applo
        </a>
        <div class="header-right">
            <div class="resume-menu" id="resume-menu">
                <button class="resume-btn" onclick="toggleDropdown()">
                    <span class="status-dot" id="resume-dot"></span>
                    <span id="resume-label">Resume</span>
                    <i data-lucide="chevron-down" style="width:12px;height:12px;opacity:0.6;"></i>
                </button>
                <div class="resume-dropdown" id="resume-dropdown">
                    <a class="dropdown-item" id="preview-item" href="/resume/preview" target="_blank">
                        <i data-lucide="eye" style="width:14px;height:14px;"></i>
                        Preview current
                    </a>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" onclick="openUploadModal()">
                        <i data-lucide="upload" style="width:14px;height:14px;"></i>
                        Upload new
                    </button>
                </div>
            </div>
            <button class="scraper-btn" onclick="alert('Run scraper from terminal: python run.py')">
                <i data-lucide="play" style="width:13px;height:13px;"></i>
                Run Scraper
            </button>
        </div>
    </header>

<div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        lucide.createIcons();

        // Dropdown
        function toggleDropdown() {
            document.getElementById('resume-dropdown').classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            if (!document.getElementById('resume-menu').contains(e.target))
                document.getElementById('resume-dropdown').classList.remove('open');
        });

        // Upload modal
        function openUploadModal() {
            document.getElementById('resume-dropdown').classList.remove('open');
            document.getElementById('upload-modal').classList.add('open');
        }
        function closeUploadModal(e) {
            if (e.target === document.getElementById('upload-modal'))
                document.getElementById('upload-modal').classList.remove('open');
        }
        function onFileSelected(input) {
            const name = input.files[0]?.name || '';
            document.getElementById('selected-filename').textContent = name;
            document.getElementById('upload-submit-btn').disabled = !name;
        }
        function onUploadDone(e) {
            if (e.detail.successful) refreshResumeStatus();
        }

        // Drag and drop
        const uploadArea = document.getElementById('upload-area');
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                const input = document.getElementById('resume-file-input');
                const dt = new DataTransfer();
                dt.items.add(file);
                input.files = dt.files;
                onFileSelected(input);
            }
        });

        // Resume status
        function refreshResumeStatus() {
            fetch('/resume/status').then(r => r.json()).then(data => {
                const dot = document.getElementById('resume-dot');
                const label = document.getElementById('resume-label');
                const previewItem = document.getElementById('preview-item');
                if (data.exists) {
                    dot.className = 'status-dot loaded';
                    label.textContent = 'Resume loaded';
                    previewItem.classList.remove('disabled');
                } else {
                    dot.className = 'status-dot missing';
                    label.textContent = 'No resume';
                    previewItem.classList.add('disabled');
                }
            });
        }
        refreshResumeStatus();

function showOptimizing(btn) {
            const cell = btn.closest('td') || btn.closest('#actions-card');
            if (!cell) return;
            const isCard = cell.id === 'actions-card';
            cell.innerHTML = isCard
                ? '<h3 style="font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);margin-bottom:0.85rem;">Actions</h3><div style="display:flex;align-items:center;gap:0.5rem;padding:0.55rem;border-radius:7px;background:#eff6ff;border:1px solid #bfdbfe;font-size:0.82rem;color:#2563eb;"><i data-lucide="loader" style="width:13px;height:13px;" class="spinning"></i> Optimizing your resume…</div>'
                : '<span class="optimizing-label"><i data-lucide="loader" style="width:13px;height:13px;" class="spinning"></i> Optimizing…</span>';
            lucide.createIcons();
        }
    </script>
</body>
</html>
