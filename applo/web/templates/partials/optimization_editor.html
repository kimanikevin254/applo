{% set opt = job.application.optimization_json | fromjson if job.application and job.application.optimization_json else None %}
{% if opt %}
<div id="optimization-editor" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;">
    <h3 style="font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);margin-bottom:0.85rem;">
        <span style="display:flex;align-items:center;justify-content:space-between;">
            <span style="display:flex;align-items:center;gap:0.35rem;">
                <i data-lucide="edit-3" style="width:13px;height:13px;color:var(--accent);"></i>
                Edit Optimization
            </span>
            {% if saved %}
            <span style="font-size:0.75rem;color:var(--success);font-weight:500;text-transform:none;">Saved &amp; regenerated</span>
            {% endif %}
        </span>
    </h3>

    <form hx-post="/job/{{ job.id }}/edit-optimization"
          hx-target="#optimization-editor"
          hx-swap="outerHTML"
          style="display:flex;flex-direction:column;gap:0.85rem;">

        <div style="display:flex;flex-direction:column;gap:0.2rem;">
            <label style="font-size:0.75rem;font-weight:600;color:var(--text);">Summary</label>
            <textarea name="summary" rows="4"
                style="padding:0.4rem 0.6rem;border:1px solid var(--border);border-radius:6px;font-size:0.82rem;font-family:inherit;line-height:1.6;resize:vertical;width:100%;"
                onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">{{ opt.summary }}</textarea>
        </div>

        <div style="display:flex;flex-direction:column;gap:0.2rem;">
            <label style="font-size:0.75rem;font-weight:600;color:var(--text);">Skills</label>
            <textarea name="skills" rows="3"
                style="padding:0.4rem 0.6rem;border:1px solid var(--border);border-radius:6px;font-size:0.82rem;font-family:inherit;line-height:1.6;resize:vertical;width:100%;"
                onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">{{ opt.skills }}</textarea>
        </div>

        <div style="display:flex;flex-direction:column;gap:0.2rem;">
            <label style="font-size:0.75rem;font-weight:600;color:var(--text);">
                Experience Bullets
                <span style="font-weight:400;color:var(--muted);font-size:0.72rem;"> · one per line</span>
            </label>
            <textarea name="bullets" rows="5"
                style="padding:0.4rem 0.6rem;border:1px solid var(--border);border-radius:6px;font-size:0.82rem;font-family:inherit;line-height:1.6;resize:vertical;width:100%;"
                onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">{{ opt.experience_bullets.bullets | join('\n') }}</textarea>
        </div>

        <div style="display:flex;flex-direction:column;gap:0.2rem;">
            <label style="font-size:0.75rem;font-weight:600;color:var(--text);">Cover Letter</label>
            <textarea name="cover_letter" rows="8"
                style="padding:0.4rem 0.6rem;border:1px solid var(--border);border-radius:6px;font-size:0.82rem;font-family:inherit;line-height:1.6;resize:vertical;width:100%;"
                onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">{{ opt.cover_letter }}</textarea>
        </div>

        <button type="submit"
            style="display:inline-flex;align-items:center;justify-content:center;gap:0.4rem;padding:0.55rem;width:100%;border:none;border-radius:7px;font-size:0.82rem;font-weight:500;cursor:pointer;background:var(--accent);color:white;transition:background 0.15s;"
            onmouseover="this.style.background='var(--accent-hover)'" onmouseout="this.style.background='var(--accent)'">
            <i data-lucide="refresh-cw" style="width:13px;height:13px;"></i>
            Save &amp; Regenerate PDFs
        </button>
    </form>
</div>
<script>lucide.createIcons();</script>
{% endif %}
